<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Mini Games</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1e2a3a, #0f1620);
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #eee;
  }
  h1 { color: #7CFC00; margin-bottom: 60px; font-size: 32px; }
  .games {
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 1400px;
  }
  .card {
    background: #16202c;
    border: 4px solid #2a3a4a;
    border-radius: 20px;
    padding: 48px 60px;
    text-align: center;
    text-decoration: none;
    color: #eee;
    transition: 0.2s;
    width: 320px;
    font-size: 20px;
  }
  .card:hover {
    border-color: #7CFC00;
    transform: translateY(-8px);
  }
  .card .emoji { font-size: 80px; display: block; margin-bottom: 20px; }
  .dotGrid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 8px;
    width: 66px;
    height: 66px;
    margin: 0 auto;
  }
  .dotGrid span {
    border-radius: 50%;
    width: 100%;
    height: 100%;
  }
  .janggi-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 1.5em;
    height: 1.5em;
    clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
    background: #f0e2c0;
    border: 0.08em solid currentColor;
    font-size: 0.62em;
    font-weight: bold;
    font-family: 'Segoe UI', Arial, sans-serif;
    vertical-align: middle;
  }
</style>
</head>
<body>
  <h1>🎮 Mini Games</h1>
  <div class="games">
    <a class="card" href="snake/">
      <span class="emoji">🐍</span>
      Snake
    </a>
    <a class="card" href="tictactoe/">
      <span class="emoji" style="font-weight:900"><span style="color:#3b82f6">O</span><span style="color:#ff5555">X</span></span>
      Tic Tac Toe
    </a>
    <a class="card" href="minesweeper/">
      <span class="emoji">💣</span>
      지뢰찾기
    </a>
    <a class="card" href="numberbaseball/">
      <span class="emoji">⚾</span>
      숫자 야구
    </a>
    <a class="card" href="gomoku/">
      <span class="emoji">⚫</span>
      오목
    </a>
    <a class="card" href="chess/">
      <span class="emoji">♞</span>
      체스
    </a>
    <a class="card" href="janggi/">
      <span class="emoji">
        <span class="janggi-badge" style="color:#2c6fbb">楚</span><span class="janggi-badge" style="color:#c0392b">漢</span>
      </span>
      장기
    </a>
    <a class="card" href="ultratictactoe/">
      <span class="emoji">
        <span class="dotGrid">
          <span style="background:#ff5555"></span><span style="background:#4d90fe"></span>
          <span style="background:#4caf50"></span><span style="background:#f1c40f"></span>
        </span>
      </span>
      81 돌 게임
    </a>
    <!-- 다음 게임 추가 시 여기에 카드 추가 -->
  </div>
</body>
</html>
