<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Snake Game</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1e2a3a, #0f1620);
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #eee;
  }
  h1 {
    margin-bottom: 8px;
    font-size: 28px;
    letter-spacing: 2px;
    color: #7CFC00;
  }
  #info {
    margin-bottom: 10px;
    font-size: 16px;
    display: flex;
    gap: 24px;
  }
  #gameCanvas {
    background: #0a0f16;
    border: 3px solid #7CFC00;
    border-radius: 8px;
    box-shadow: 0 0 20px rgba(124, 252, 0, 0.3);
  }
  #message {
    margin-top: 12px;
    font-size: 15px;
    color: #aaa;
    text-align: center;
    min-height: 20px;
  }
  button {
    margin-top: 10px;
    padding: 8px 20px;
    font-size: 15px;
    background: #7CFC00;
    color: #0a0f16;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
  }
  button:hover { background: #90ff20; }
  .hidden { display: none; }
</style>
</head>
<body>

<h1>🐍 SNAKE</h1>
<div id="info">
  <span>점수: <span id="score">0</span></span>
  <span>최고점수: <span id="highScore">0</span></span>
</div>
<canvas id="gameCanvas" width="400" height="400"></canvas>
<div id="message">방향키 또는 스와이프로 조작하세요. 스페이스바로 시작!</div>
<button id="restartBtn" class="hidden">다시 시작</button>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const highScoreEl = document.getElementById('highScore');
const messageEl = document.getElementById('message');
const restartBtn = document.getElementById('restartBtn');

const gridSize = 20;
const tileCount = canvas.width / gridSize;

let snake, dx, dy, food, score, gameRunning, gameLoop;
let highScore = Number(localStorage.getItem('snakeHighScore') || 0);
highScoreEl.textContent = highScore;

function init() {
  snake = [{x: 10, y: 10}];
  dx = 0; dy = 0;
  score = 0;
  scoreEl.textContent = score;
  placeFood();
  gameRunning = false;
  messageEl.textContent = '방향키 또는 스와이프로 조작하세요. 스페이스바로 시작!';
  restartBtn.classList.add('hidden');
  draw();
}

function placeFood() {
  food = {
    x: Math.floor(Math.random() * tileCount),
    y: Math.floor(Math.random() * tileCount)
  };
  for (const seg of snake) {
    if (seg.x === food.x && seg.y === food.y) {
      placeFood();
      return;
    }
  }
}

function draw() {
  ctx.fillStyle = '#0a0f16';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#ff5555';
  ctx.beginPath();
  ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
  ctx.fill();

  snake.forEach((seg, i) => {
    ctx.fillStyle = i === 0 ? '#7CFC00' : '#4caf50';
    ctx.fillRect(seg.x * gridSize + 1, seg.y * gridSize + 1, gridSize - 2, gridSize - 2);
  });
}

function update() {
  const head = {x: snake[0].x + dx, y: snake[0].y + dy};

  if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
    return gameOver();
  }
  if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
    return gameOver();
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10;
    scoreEl.textContent = score;
    placeFood();
  } else {
    snake.pop();
  }

  draw();
}

function gameOver() {
  clearInterval(gameLoop);
  gameRunning = false;
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('snakeHighScore', highScore);
    highScoreEl.textContent = highScore;
    messageEl.textContent = `게임 오버! 새로운 최고 점수: ${score} 🎉`;
  } else {
    messageEl.textContent = `게임 오버! 점수: ${score}`;
  }
  restartBtn.classList.remove('hidden');
}

function startGame() {
  if (gameRunning) return;
  if (dx === 0 && dy === 0) dx = 1;
  gameRunning = true;
  messageEl.textContent = '';
  gameLoop = setInterval(update, 110);
}

document.addEventListener('keydown', (e) => {
  const key = e.key;
  if (key === ' ') {
    e.preventDefault();
    if (!gameRunning) startGame();
    return;
  }
  if (key === 'ArrowUp' && dy !== 1) { dx = 0; dy = -1; startGame(); }
  else if (key === 'ArrowDown' && dy !== -1) { dx = 0; dy = 1; startGame(); }
  else if (key === 'ArrowLeft' && dx !== 1) { dx = -1; dy = 0; startGame(); }
  else if (key === 'ArrowRight' && dx !== -1) { dx = 1; dy = 0; startGame(); }
});

let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
});
canvas.addEventListener('touchend', (e) => {
  const dxT = e.changedTouches[0].clientX - touchStartX;
  const dyT = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dxT) > Math.abs(dyT)) {
    if (dxT > 20 && dx !== -1) { dx = 1; dy = 0; startGame(); }
    else if (dxT < -20 && dx !== 1) { dx = -1; dy = 0; startGame(); }
  } else {
    if (dyT > 20 && dy !== -1) { dx = 0; dy = 1; startGame(); }
    else if (dyT < -20 && dy !== 1) { dx = 0; dy = -1; startGame(); }
  }
});

restartBtn.addEventListener('click', init);

init();
</script>
</body>
</html>
