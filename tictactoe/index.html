<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Vanishing Tic Tac Toe</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1e2a3a, #0f1620);
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #eee;
    padding: 40px 0;
  }
  h1 {
    margin-bottom: 8px;
    font-size: 52px;
    letter-spacing: 2px;
    color: #7CFC00;
    text-align: center;
  }
  #subtitle {
    font-size: 26px;
    color: #999;
    margin-bottom: 28px;
    text-align: center;
    max-width: 640px;
  }
  .settingGroup {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }
  .settingLabel {
    font-size: 24px;
    color: #999;
  }
  .settingRow {
    display: flex;
    gap: 20px;
  }
  .optBtn {
    padding: 14px 32px;
    font-size: 28px;
    background: #16202c;
    color: #eee;
    border: 4px solid #2a3a4a;
    border-radius: 12px;
    cursor: pointer;
  }
  .optBtn.active {
    border-color: #7CFC00;
    color: #7CFC00;
  }
  #status {
    margin: 20px 0 28px;
    font-size: 34px;
    min-height: 48px;
    text-align: center;
  }
  #board {
    display: grid;
    grid-template-columns: repeat(3, 200px);
    grid-template-rows: repeat(3, 200px);
    gap: 12px;
    background: #2a3a4a;
    padding: 12px;
    border-radius: 20px;
  }
  .cell {
    background: #0a0f16;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 96px;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s, opacity 0.2s;
  }
  .cell:hover {
    background: #16202c;
  }
  .cell.x { color: #ff5555; }
  .cell.o { color: #3b82f6; }
  .cell.win {
    background: rgba(124, 252, 0, 0.15);
  }
  .cell.fading {
    opacity: 0.35;
    animation: pulse 1s infinite alternate;
  }
  @keyframes pulse {
    from { opacity: 0.35; }
    to { opacity: 0.65; }
  }
  #score {
    margin-top: 32px;
    display: flex;
    gap: 48px;
    font-size: 30px;
  }
  button#resetBtn {
    margin-top: 28px;
    padding: 16px 40px;
    font-size: 30px;
    background: #7CFC00;
    color: #0a0f16;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
  }
  button#resetBtn:hover { background: #90ff20; }
</style>
</head>
<body>

<h1><span style="color:#3b82f6">O</span> 사라지는 틱택토 <span style="color:#ff5555">X</span></h1>
<div id="subtitle">각자 말은 최대 3개까지! 4번째를 두면 자기 말 중 가장 오래된 게 사라져요.</div>

<div class="settingGroup">
  <span class="settingLabel">상대 종류</span>
  <div class="settingRow" id="modeSelect">
    <button class="optBtn active" data-mode="cpu">컴퓨터와 대전</button>
    <button class="optBtn" data-mode="pvp">2인 플레이</button>
  </div>
</div>

<div class="settingGroup">
  <span class="settingLabel">내 기호</span>
  <div class="settingRow" id="symbolSelect">
    <button class="optBtn active" data-symbol="O" style="color:#3b82f6">O</button>
    <button class="optBtn" data-symbol="X" style="color:#ff5555">X</button>
  </div>
</div>

<div class="settingGroup">
  <span class="settingLabel">먼저 두는 사람</span>
  <div class="settingRow" id="firstSelect">
    <button class="optBtn active" data-first="me">나</button>
    <button class="optBtn" data-first="opponent">상대</button>
  </div>
</div>

<div id="status">시작합니다...</div>
<div id="board"></div>

<div id="score">
  <span>승점 | 나 : <span id="scoreMe">0</span> vs 상대 : <span id="scoreOpp">0</span></span>
</div>

<button id="resetBtn">다시 시작</button>

<script>
const boardEl = document.getElementById('board');
const statusEl = document.getElementById('status');
const resetBtn = document.getElementById('resetBtn');
const modeBtns = document.querySelectorAll('#modeSelect .optBtn');
const symbolBtns = document.querySelectorAll('#symbolSelect .optBtn');
const firstBtns = document.querySelectorAll('#firstSelect .optBtn');
const scoreMeEl = document.getElementById('scoreMe');
const scoreOppEl = document.getElementById('scoreOpp');

let cells = Array(9).fill(null);
let playerMoves = { X: [], O: [] };
let currentPlayer = 'X';
let gameActive = true;

let mode = 'cpu';          // 'pvp' | 'cpu'
let mySymbol = 'O';        // 'X' | 'O' - 내가 쓸 기호
let firstMover = 'me';     // 'me' | 'opponent'
let scores = { me: 0, opponent: 0 };

const winPatterns = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

function otherSymbol(s) { return s === 'X' ? 'O' : 'X'; }
function opponentSymbol() { return otherSymbol(mySymbol); }
function labelOf(symbol) {
  if (symbol === mySymbol) return '나';
  return mode === 'cpu' ? '컴퓨터' : '상대';
}
function roleOf(symbol) { return symbol === mySymbol ? 'me' : 'opponent'; }

function buildBoard() {
  boardEl.innerHTML = '';
  cells.forEach((val, i) => {
    const cellDiv = document.createElement('div');
    cellDiv.className = 'cell';
    cellDiv.dataset.index = i;
    cellDiv.addEventListener('click', () => handleClick(i));
    boardEl.appendChild(cellDiv);
  });
}

function render() {
  const cellDivs = boardEl.children;
  cells.forEach((val, i) => {
    cellDivs[i].textContent = val || '';
    let cls = 'cell';
    if (val === 'X') cls += ' x';
    if (val === 'O') cls += ' o';
    cellDivs[i].className = cls;
  });

  ['X', 'O'].forEach(symbol => {
    if (playerMoves[symbol].length === 3) {
      const fadingIndex = playerMoves[symbol][0];
      cellDivs[fadingIndex].classList.add('fading');
    }
  });
}

function handleClick(i) {
  if (!gameActive || cells[i]) return;
  // pvp 모드에서는 아무나 클릭 가능(로컬 2인), cpu 모드에서는 내 차례일 때만 클릭 허용
  if (mode === 'cpu' && currentPlayer !== mySymbol) return;

  makeMove(i, currentPlayer);
  if (checkEnd()) return;

  currentPlayer = otherSymbol(currentPlayer);
  updateStatus();

  if (mode === 'cpu' && currentPlayer !== mySymbol && gameActive) {
    statusEl.textContent = '컴퓨터 생각 중...';
    setTimeout(cpuMove, 500);
  }
}

function makeMove(i, symbol) {
  if (playerMoves[symbol].length === 3) {
    const oldest = playerMoves[symbol].shift();
    cells[oldest] = null;
  }
  cells[i] = symbol;
  playerMoves[symbol].push(i);
  render();
}

function updateStatus() {
  const willVanish = playerMoves[currentPlayer].length === 3;
  statusEl.textContent = `${labelOf(currentPlayer)}(${currentPlayer}) 차례입니다` + (willVanish ? ' — 이번 수를 두면 오래된 말이 사라져요' : '');
}

function checkEnd() {
  const winInfo = getWinner();
  if (winInfo) {
    gameActive = false;
    highlightWin(winInfo.pattern);
    const role = roleOf(winInfo.winner);
    statusEl.textContent = `🎉 ${labelOf(winInfo.winner)}(${winInfo.winner}) 승리!`;
    scores[role]++;
    updateScore();
    return true;
  }
  return false;
}

function getWinner() {
  for (const pattern of winPatterns) {
    const [a,b,c] = pattern;
    if (cells[a] && cells[a] === cells[b] && cells[a] === cells[c]) {
      return { winner: cells[a], pattern };
    }
  }
  return null;
}

function highlightWin(pattern) {
  const cellDivs = boardEl.children;
  pattern.forEach(i => cellDivs[i].classList.add('win'));
}

function updateScore() {
  scoreMeEl.textContent = scores.me;
  scoreOppEl.textContent = scores.opponent;
}

function cpuMove() {
  if (!gameActive) return;
  const cpuSymbol = opponentSymbol();
  let move = findBestMove(cpuSymbol) ?? findBestMove(mySymbol) ?? randomMove();
  makeMove(move, cpuSymbol);

  if (checkEnd()) return;

  currentPlayer = mySymbol;
  updateStatus();
}

function findBestMove(symbol) {
  for (const pattern of winPatterns) {
    const [a,b,c] = pattern;
    const line = [cells[a], cells[b], cells[c]];
    const idxs = [a,b,c];
    const count = line.filter(v => v === symbol).length;
    const emptyIdx = idxs[line.findIndex(v => v === null)];
    if (count === 2 && line.includes(null)) {
      return emptyIdx;
    }
  }
  return null;
}

function randomMove() {
  const empty = cells.map((v,i) => v === null ? i : null).filter(v => v !== null);
  return empty[Math.floor(Math.random() * empty.length)];
}

function resetGame() {
  cells = Array(9).fill(null);
  playerMoves = { X: [], O: [] };
  gameActive = true;

  currentPlayer = (firstMover === 'me') ? mySymbol : opponentSymbol();

  buildBoard();
  render();
  updateStatus();

  if (mode === 'cpu' && currentPlayer !== mySymbol) {
    statusEl.textContent = '컴퓨터 생각 중...';
    setTimeout(cpuMove, 500);
  }
}

function resetScoresAndGame() {
  scores = { me: 0, opponent: 0 };
  updateScore();
  resetGame();
}

resetBtn.addEventListener('click', resetGame);

modeBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    modeBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    resetScoresAndGame();
  });
});

symbolBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    symbolBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mySymbol = btn.dataset.symbol;
    resetScoresAndGame();
  });
});

firstBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    firstBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    firstMover = btn.dataset.first;
    resetScoresAndGame();
  });
});

buildBoard();
render();
resetGame();
</script>
</body>
</html>
