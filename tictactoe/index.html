<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Vanishing Tic Tac Toe</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1e2a3a, #0f1620);
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #eee;
  }
  h1 {
    margin-bottom: 4px;
    font-size: 26px;
    letter-spacing: 1px;
    color: #7CFC00;
    text-align: center;
  }
  #subtitle {
    font-size: 13px;
    color: #999;
    margin-bottom: 14px;
    text-align: center;
    max-width: 320px;
  }
  #modeSelect {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }
  .modeBtn {
    padding: 8px 16px;
    font-size: 14px;
    background: #16202c;
    color: #eee;
    border: 2px solid #2a3a4a;
    border-radius: 6px;
    cursor: pointer;
  }
  .modeBtn.active {
    border-color: #7CFC00;
    color: #7CFC00;
  }
  #status {
    margin-bottom: 14px;
    font-size: 17px;
    min-height: 24px;
    text-align: center;
  }
  #board {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    grid-template-rows: repeat(3, 100px);
    gap: 6px;
    background: #2a3a4a;
    padding: 6px;
    border-radius: 10px;
  }
  .cell {
    background: #0a0f16;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s, opacity 0.2s;
  }
  .cell:hover {
    background: #16202c;
  }
  .cell.x { color: #7CFC00; }
  .cell.o { color: #ff5555; }
  .cell.win {
    background: rgba(124, 252, 0, 0.15);
  }
  .cell.fading {
    opacity: 0.35;
    animation: pulse 1s infinite alternate;
  }
  @keyframes pulse {
    from { opacity: 0.35; }
    to { opacity: 0.65; }
  }
  #score {
    margin-top: 16px;
    display: flex;
    gap: 24px;
    font-size: 15px;
  }
  button#resetBtn {
    margin-top: 14px;
    padding: 8px 20px;
    font-size: 15px;
    background: #7CFC00;
    color: #0a0f16;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
  }
  button#resetBtn:hover { background: #90ff20; }
</style>
</head>
<body>

<h1>👻 사라지는 틱택토</h1>
<div id="subtitle">각자 말은 최대 3개까지! 4번째를 두면 자기 말 중 가장 오래된 게 사라져요. (흐릿하게 깜빡이는 말이 다음에 사라질 말이에요)</div>

<div id="modeSelect">
  <button class="modeBtn active" data-mode="pvp">2인 플레이</button>
  <button class="modeBtn" data-mode="cpu">컴퓨터와 대전</button>
</div>

<div id="status">X 차례입니다</div>
<div id="board"></div>

<div id="score">
  <span>X 승: <span id="scoreX">0</span></span>
  <span>O 승: <span id="scoreO">0</span></span>
</div>

<button id="resetBtn">다시 시작</button>

<script>
const boardEl = document.getElementById('board');
const statusEl = document.getElementById('status');
const resetBtn = document.getElementById('resetBtn');
const modeBtns = document.querySelectorAll('.modeBtn');
const scoreXEl = document.getElementById('scoreX');
const scoreOEl = document.getElementById('scoreO');

let cells = Array(9).fill(null);
let playerMoves = { X: [], O: [] }; // 각 플레이어가 둔 순서대로 칸 번호 저장 (최대 3개)
let currentPlayer = 'X';
let gameActive = true;
let mode = 'pvp';
let scores = { X: 0, O: 0 };

const winPatterns = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

function buildBoard() {
  boardEl.innerHTML = '';
  cells.forEach((val, i) => {
    const cellDiv = document.createElement('div');
    cellDiv.className = 'cell';
    cellDiv.dataset.index = i;
    cellDiv.addEventListener('click', () => handleClick(i));
    boardEl.appendChild(cellDiv);
  });
}

function render() {
  const cellDivs = boardEl.children;
  cells.forEach((val, i) => {
    cellDivs[i].textContent = val || '';
    let cls = 'cell';
    if (val === 'X') cls += ' x';
    if (val === 'O') cls += ' o';
    cellDivs[i].className = cls;
  });

  // 다음에 사라질 말 표시 (각 플레이어가 이미 3개를 뒀을 때, 가장 오래된 말)
  ['X', 'O'].forEach(player => {
    if (playerMoves[player].length === 3) {
      const fadingIndex = playerMoves[player][0];
      cellDivs[fadingIndex].classList.add('fading');
    }
  });
}

function handleClick(i) {
  if (!gameActive || cells[i]) return;
  makeMove(i, currentPlayer);

  if (checkEnd()) return;

  currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
  updateStatus();

  if (mode === 'cpu' && currentPlayer === 'O' && gameActive) {
    statusEl.textContent = '컴퓨터 생각 중...';
    setTimeout(cpuMove, 500);
  }
}

function makeMove(i, player) {
  // 이미 3개를 뒀다면 가장 오래된 말 제거
  if (playerMoves[player].length === 3) {
    const oldest = playerMoves[player].shift();
    cells[oldest] = null;
  }
  cells[i] = player;
  playerMoves[player].push(i);
  render();
}

function updateStatus() {
  const willVanish = playerMoves[currentPlayer].length === 3;
  statusEl.textContent = `${currentPlayer} 차례입니다` + (willVanish ? ' (이번 수를 두면 오래된 말이 사라져요)' : '');
}

function checkEnd() {
  const winInfo = getWinner();
  if (winInfo) {
    gameActive = false;
    highlightWin(winInfo.pattern);
    statusEl.textContent = `🎉 ${winInfo.winner} 승리!`;
    scores[winInfo.winner]++;
    updateScore();
    return true;
  }
  return false;
  // 참고: 말이 계속 사라지고 다시 놓이는 방식이라 무승부(보드 꽉 참)는 사실상 발생하지 않음
}

function getWinner() {
  for (const pattern of winPatterns) {
    const [a,b,c] = pattern;
    if (cells[a] && cells[a] === cells[b] && cells[a] === cells[c]) {
      return { winner: cells[a], pattern };
    }
  }
  return null;
}

function highlightWin(pattern) {
  const cellDivs = boardEl.children;
  pattern.forEach(i => cellDivs[i].classList.add('win'));
}

function updateScore() {
  scoreXEl.textContent = scores.X;
  scoreOEl.textContent = scores.O;
}

// 간단한 CPU: 이길 수 있으면 이기고, 막아야 하면 막고, 아니면 랜덤
function cpuMove() {
  if (!gameActive) return;

  let move = findBestMove('O') ?? findBestMove('X') ?? randomMove();
  makeMove(move, 'O');

  if (checkEnd()) return;

  currentPlayer = 'X';
  updateStatus();
}

function findBestMove(player) {
  for (const pattern of winPatterns) {
    const [a,b,c] = pattern;
    const line = [cells[a], cells[b], cells[c]];
    const idxs = [a,b,c];
    const playerCount = line.filter(v => v === player).length;
    const emptyIdx = idxs[line.findIndex(v => v === null)];
    if (playerCount === 2 && line.includes(null)) {
      return emptyIdx;
    }
  }
  return null;
}

function randomMove() {
  const empty = cells.map((v,i) => v === null ? i : null).filter(v => v !== null);
  return empty[Math.floor(Math.random() * empty.length)];
}

function resetGame() {
  cells = Array(9).fill(null);
  playerMoves = { X: [], O: [] };
  currentPlayer = 'X';
  gameActive = true;
  buildBoard();
  render();
  updateStatus();
}

resetBtn.addEventListener('click', resetGame);

modeBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    modeBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    resetGame();
  });
});

buildBoard();
render();
updateStatus();
</script>
</body>
</html>
